<!DOCTYPE html>
<html>
<body>

<h2>Image Gallery</h2>

<img id="main" width="300">

<div id="gallery">
    <img src="image1.jpg" width="100">
    <img src="image2.jpg" width="100">
    <img src="image3.jpg" width="100">
</div>

<script>

gallery.onclick=function(e){

    if(e.target.tagName=="IMG")
        main.src=e.target.src;

}

</script>

</body>
</html>
